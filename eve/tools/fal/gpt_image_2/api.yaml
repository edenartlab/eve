name: GPT Image 2
description: OpenAI's gpt-image-2 (PREMIUM) — the strongest image generation AND editing model available; best-in-class instruction following, multilingual text rendering, up to 16 reference images, mask inpainting, and 4K output.
tip: |-
  PREMIUM MODEL — at "high" quality this is one of the most expensive image
  tools on Eden (~20x the standard tier). Only use when the user has affirmed
  they want top quality, or the agent defaults to pro. For routine images use
  the standard tools; "medium" quality here is a good middle ground at ~1/4
  the cost of high.

  WHAT IT'S UNIQUELY GOOD AT:
  - Instruction-based EDITING: pass input_images and describe the change in
    plain language ("replace the sky with dusk, keep the reflection
    consistent"). It is the current leader at preserving everything you did
    not ask to change.
  - Complex composition from many references: up to 16 input_images — product
    shots, faces, style frames — combined per your instructions.
  - Long, exact TEXT in images (posters, UI mockups, signage) in many
    languages, including CJK and Indic scripts.
  - Masked inpainting: provide mask (white = editable region) with one input
    image for surgical edits.

  USAGE NOTES:
  - quality: "high" buys extra reasoning before rendering — reserve for
    finals; "medium" for iteration; "low" is drafts only.
  - Custom sizes up to 3840px on the long edge (multiples of 16, aspect <=3:1).
  - Slower than other image tools (tens of seconds at high quality) — tell the
    user it's worth the wait.
# fal per-image: 1024x1024 low .006 / med .053 / high .211; ~2x at 4K sizes
cost_estimate: '(quality == "high" ? 25 : quality == "medium" ? 6.5 : 1) * n_samples * (image_size == "4k" ? 1.9 : 1)'
output_type: image
handler: modal
visible: true
active: true
thumbnail: app/gpt_image_2.jpg
parameters:
  prompt:
    type: string
    label: Prompt
    description: What to generate — or, with input_images, the editing instruction.
    required: true
  input_images:
    type: array
    items:
      type: image
    label: Input images
    description: Up to 16 reference/source images for editing and composition.
    max_length: 16
  mask:
    type: image
    label: Inpainting mask
    description: Optional mask (white = region to edit) — requires exactly one input image.
  quality:
    type: string
    label: Quality
    description: high = best (expensive, slower, extra reasoning); medium = iteration; low = drafts.
    default: medium
    choices: ['low', 'medium', 'high']
  image_size:
    type: string
    label: Size
    description: Output size preset. "4k" renders at 3840px long edge (~2x cost).
    default: '1024'
    choices: ['1024', 'portrait', 'landscape', '4k']
  aspect_ratio:
    type: string
    label: Aspect ratio
    default: '1:1'
    choices: ['1:1', '3:4', '4:3', '9:16', '16:9']
    hide_from_user: true
    hide_from_agent: true
  n_samples:
    type: integer
    label: Number of images
    default: 1
    minimum: 1
    maximum: 4
  output_format:
    type: string
    default: png
    choices: ['png', 'jpeg', 'webp']
    hide_from_user: true
    hide_from_agent: true
