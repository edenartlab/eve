name: Talking Head
description: Talking head generated with Hedra
tip: |-
  This takes an image of a face and some speech audio and generates a talking head.
# Hedra bills ~$0.07/s of output video; output length tracks the input audio,
# which isn't measurable in this expression -> flat price sized for ~20s clips.
cost_estimate: 150
output_type: video
handler: modal
thumbnail: app/hedra_opt.mp4
active: true
visible: true
parameters:
  image:
    type: image
    label: Input image
    description: Face image
    required: true
  audio:
    type: audio
    label: Input audio
    description: Speech audio
    required: true
  aspectRatio:
    type: string
    label: Aspect ratio
    required: true
    description: Video aspect ratio
    default: '1:1'
    choices: ['16:9', '1:1', '9:16']
  prompt:
    type: string
    label: Prompt
    description: Prompt for the video
    default: 'A talking head'
  resolution:
    type: string
    label: Resolution
    description: Video resolution
    default: '720p'
    choices: ['540p', '720p']
