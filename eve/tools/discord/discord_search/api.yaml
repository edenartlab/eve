name: discord_search
description: Search for messages in specific Discord channels by channel note/name, time range, and message count.
tip: |-
  This tool can search multiple channels in a single cal, but typically you would call this tool multiple times, once per channel.
  Query format: Always specify the channel name(s)/note(s) explicitly in your query along with the time range and optionally maximum message count.
  
  Examples:
  - "Get all messages from the research channel from the past 24 hours"
  - "Show me messages from announcements and general channels from the past week, limited to 25 messages per channel"
  - "Get the last 10 messages from the support channel"
  
  For comprehensive searches across multiple channels, include all relevant channel names in a single query rather than making separate calls.
  
  DO NOT use topic-based queries like "new features" or "updates" - instead specify the actual channel names you want to search.
cost_estimate: 0
output_type: array
active: true
handler: local
visible: false
parameters:
  query:
    type: string
    description: Search query to match against channel notes
    required: true
